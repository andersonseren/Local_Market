{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Local Market" style="max-height: 80px;">
            <h2 class="mt-3">Recuperar contraseña</h2>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label>Correo electrónico</label>
                <input type="email" name="email" class="form-control" required placeholder="tu@email.com">
                <small class="text-muted">Te enviaremos un enlace para restablecer tu contraseña.</small>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar enlace</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}">Volver al inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
