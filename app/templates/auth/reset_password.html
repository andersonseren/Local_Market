{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Local Market" style="max-height: 80px;">
            <h2 class="mt-3">Nueva contraseña</h2>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label>Nueva contraseña</label>
                <input type="password" name="password" class="form-control" required minlength="4">
            </div>
            <div class="mb-3">
                <label>Confirmar contraseña</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="4">
            </div>
            <button type="submit" class="btn btn-primary w-100">Actualizar contraseña</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}">Volver al inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
