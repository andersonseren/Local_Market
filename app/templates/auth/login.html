{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Local Market" style="max-height: 80px;">
            <h2 class="mt-3">Iniciar sesión</h2>
        </div>
        
        <form method="POST">
            <div class="mb-3">
                <label>Correo electrónico</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label>Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.forgot_password') }}">¿Olvidaste tu contraseña?</a>
        </div>
        
        <div class="text-center mt-2">
            <p>¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
