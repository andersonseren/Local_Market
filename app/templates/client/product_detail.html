{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        {% if product.image_url %}
        <img src="{{ product.image_url }}" class="img-fluid rounded" alt="{{ product.name }}">
        {% else %}
        <div class="bg-secondary text-white d-flex align-items-center justify-content-center rounded" style="height: 300px;">Sin imagen</div>
        {% endif %}
    </div>
    <div class="col-md-6">
        <h1>{{ product.name }}</h1>
        <p class="lead">{{ product.description }}</p>
        <h2 class="text-primary">{{ product.price|currency }}</h2>
        <p>Stock disponible: <strong>{{ product.stock }}</strong> unidades</p>
        <form method="POST" action="{{ url_for('client.add_to_cart', product_id=product.id) }}">
            <div class="input-group mb-3 w-50">
                <input type="number" name="quantity" value="1" min="1" max="{{ product.stock }}" class="form-control">
                <button type="submit" class="btn btn-primary">Agregar al carrito</button>
            </div>
        </form>
        <a href="{{ url_for('client.catalog') }}" class="btn btn-secondary">Volver al catálogo</a>
    </div>
</div>
{% endblock %}
