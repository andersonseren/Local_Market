{% extends "base.html" %}
{% block content %}
<h1>Editar usuario</h1>
<form method="POST">
    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
    </div>
    <div class="mb-3">
        <label>Apellido</label>
        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
    </div>
    <div class="mb-3">
        <label>Rol</label>
        <select name="role" class="form-select">
            <option value="cliente" {% if user.role == 'cliente' %}selected{% endif %}>Cliente</option>
            <option value="emprendedor" {% if user.role == 'emprendedor' %}selected{% endif %}>Emprendedor</option>
            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Administrador</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Nueva contraseña (dejar en blanco si no se cambia)</label>
        <input type="password" name="password" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Guardar cambios</button>
    <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
