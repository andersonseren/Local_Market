{% extends "base.html" %}
{% block content %}
<h1>Editar producto</h1>
<form method="POST">
    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
    </div>
    <div class="mb-3">
        <label>Descripción</label>
        <textarea name="description" class="form-control" rows="4">{{ product.description }}</textarea>
    </div>
    <div class="mb-3">
        <label>Precio (COP)</label>
        <input type="number" step="1" name="price" class="form-control" value="{{ product.price }}" required>
    </div>
    <div class="mb-3">
        <label>Stock</label>
        <input type="number" name="stock" class="form-control" value="{{ product.stock }}" required>
    </div>
    <div class="mb-3">
        <label>Categoría</label>
        <select name="category_id" class="form-select">
            <option value="">Sin categoría</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>URL de imagen</label>
        <input type="url" name="image_url" class="form-control" value="{{ product.image_url }}">
    </div>
    <button type="submit" class="btn btn-primary">Guardar cambios</button>
    <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
